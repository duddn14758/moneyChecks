<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>

<link rel="manifest" href="/moneyChecks/manifest.json">
<meta name="theme-color" content="#4CAF50">
  
<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f6f8;
  margin: 0;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #4CAF50; color: white; }
.danger { background: #ff4d4f; color: white; }
.logout { background: #999; color: white; }

.row { display: flex; gap: 10px; }
.row > * { flex: 1; }

.record {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}

.date {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}

.row-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.content {
  font-size: 15px;
  font-weight: 500;
  flex: 1;
  margin-right: 10px;
}

.right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.amount {
  font-weight: bold;
  white-space: nowrap;
}

button.small {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h2>🐿️ 가계부</h2>

<div id="loginBox" class="card">
  <input type="password" id="pw" placeholder="비밀번호">
  <button class="primary" onclick="login()">입장</button>
</div>

<div id="app" style="display:none;">

  <button class="logout" onclick="logout()">로그아웃</button>

  <div class="card">
    <input type="date" id="date">
    <select id="category"></select>
    <input type="text" id="tag" placeholder="태그 (예: 수입, 지출)">
    <input type="text" id="content" placeholder="내용">
    <input type="number" id="amount" placeholder="금액">

    <div class="row">
      <select id="inAccount"></select>
      <select id="outAccount"></select>
    </div>

    <button class="primary" onclick="save()">저장</button>
  </div>

  <div class="card" id="list"></div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwTHshsyK5DkxTKjPg-LHpmgVEEMdQ44VsTTIU6CxrvHkVY8m8PF3wLJkzySJ3xXyll/exec";

let SECRET = "";
let categories = [];
let records = [];
let accounts = [];

window.onload = function () {
  const saved = localStorage.getItem("secret");
  if (saved) {
    SECRET = saved;
    initApp();
  }
};

function login() {
  const pw = document.getElementById("pw").value;
  if (!pw) return alert("비밀번호 입력");

  SECRET = pw;
  localStorage.setItem("secret", pw);
  initApp();
}

function logout() {
  localStorage.removeItem("secret");
  location.reload();
}

function initApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("date").valueAsDate = new Date();
  loadData();
}

function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      categories = data.categories || [];
      records = data.records || [];
      accounts = data.accounts || [];

      renderCategory();
      renderAccounts();
      renderList();
    })
    .catch(() => alert("API 실패"));
}

function renderCategory() {
  const select = document.getElementById("category");
  select.innerHTML = `<option value="">카테고리 선택</option>`;
  categories.forEach(c => {
    select.innerHTML += `<option value="${c.value}">${c.value}</option>`;
  });
}

function renderAccounts() {
  const inSelect = document.getElementById("inAccount");
  const outSelect = document.getElementById("outAccount");

  inSelect.innerHTML = `
    <option value="">입금계좌 (선택안함)</option>
    <option value="">- 없음 -</option>
  `;

  outSelect.innerHTML = `
    <option value="">출금계좌 (선택안함)</option>
    <option value="">- 없음 -</option>
  `;

  accounts.forEach(acc => {
    inSelect.innerHTML += `<option value="${acc}">${acc}</option>`;
    outSelect.innerHTML += `<option value="${acc}">${acc}</option>`;
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,"0")}-${d.getDate().toString().padStart(2,"0")}`;
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach(r => {
    list.innerHTML += `
      <div class="record">
        <div class="date">${formatDate(r.date)}</div>
        <div class="row-line">
          <div class="content">${r.content}</div>
          <div class="right">
            <div class="amount">${Number(r.amount).toLocaleString()}원</div>
            <button class="danger small" onclick="remove(${r.rowIndex})">삭제</button>
          </div>
        </div>
      </div>
    `;
  });
}

function save() {
  const rawDate = document.getElementById("date").value;

  const data = {
    action: "add",
    secret: SECRET,
    date: rawDate.replaceAll("-", "/"),
    type: document.getElementById("category").value,
    tag: document.getElementById("tag").value,
    content: document.getElementById("content").value,
    amount: Number(document.getElementById("amount").value),
    inAccount: document.getElementById("inAccount").value,
    outAccount: document.getElementById("outAccount").value
  };

  if (!data.type || !data.amount) {
    return alert("필수값 입력");
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => {
    alert("저장되었습니다 ✅");   // 👈 추가

    document.getElementById("content").value = "";
    document.getElementById("amount").value = "";

    loadData();
  });
}

function remove(rowIndex) {
  if (!confirm("정말 삭제하시겠습니까?")) return;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      secret: SECRET,
      rowIndex
    })
  }).then(() => loadData());
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("SW registered"));
}
</script>

</body>
</html>
