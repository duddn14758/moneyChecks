<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: #4CAF50;
  color: white;
}

.danger {
  background: #ff4d4f;
  color: white;
}

.logout {
  background: #999;
  color: white;
  margin-bottom: 10px;
}

.record {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.record-info {
  display: flex;
  flex-direction: column;
}

.amount {
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🐿️ 가계부</h2>

<!-- 🔐 로그인 -->
<div id="loginBox" class="card">
  <input type="password" id="pw" placeholder="비밀번호 입력">
  <button class="primary" onclick="login()">입장</button>
</div>

<!-- 📱 앱 -->
<div id="app" style="display:none;">

  <button class="logout" onclick="logout()">로그아웃</button>

  <!-- 입력 카드 -->
  <div class="card">
    <input type="date" id="date">
    <select id="category"></select>
    <input type="text" id="content" placeholder="내용">
    <input type="number" id="amount" placeholder="금액">

    <button class="primary" onclick="save()">저장</button>
  </div>

  <!-- 리스트 -->
  <div class="card" id="list"></div>

</div>

</div>

<script>
const API = "여기에_AppsScript_URL";

let SECRET = "";
let categories = [];
let records = [];

// 자동 로그인
window.onload = function () {
  const saved = localStorage.getItem("secret");
  if (saved) {
    SECRET = saved;
    initApp();
  }
};

function login() {
  const pw = document.getElementById("pw").value;
  if (!pw) return alert("비밀번호 입력해줘");

  SECRET = pw;
  localStorage.setItem("secret", pw);
  initApp();
}

function logout() {
  localStorage.removeItem("secret");
  location.reload();
}

function initApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("date").valueAsDate = new Date();
  loadData();
}

function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      categories = data.categories;
      records = data.records;
      renderCategory();
      renderList();
    });
}

function renderCategory() {
  const select = document.getElementById("category");
  select.innerHTML = "<option>카테고리 선택</option>";

  categories.forEach(c => {
    select.innerHTML += `<option>${c.value}</option>`;
  });
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.slice().reverse().forEach(r => {
    list.innerHTML += `
      <div class="record">
        <div class="record-info">
          <div>${r.content}</div>
          <small>${r.date}</small>
        </div>
        <div>
          <div class="amount">${Number(r.amount).toLocaleString()}원</div>
          <button class="danger" onclick="remove(${r.rowIndex})">삭제</button>
        </div>
      </div>
    `;
  });
}

function save() {
  const data = {
    action: "add",
    secret: SECRET,
    date: document.getElementById("date").value,
    type: document.getElementById("category").value,
    content: document.getElementById("content").value,
    amount: document.getElementById("amount").value
  };

  if (!data.type || !data.amount) {
    return alert("필수값 입력해줘!");
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => location.reload());
}

function remove(rowIndex) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      secret: SECRET,
      rowIndex
    })
  }).then(() => location.reload());
}
</script>

</body>
</html>
