<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 16px;
    }
    button { background: #4CAF50; color: white; font-weight: bold; }
    .record { border-bottom: 1px solid #ccc; padding: 10px 0; }
  </style>
</head>
<body>

<h2>🐿️ 가계부</h2>

<!-- 🔐 로그인 -->
<div id="loginBox">
  <input type="password" id="pw" placeholder="비밀번호 입력">
  <button onclick="login()">입장</button>
</div>

<!-- 📱 앱 영역 -->
<div id="app" style="display:none;">

  <button onclick="logout()">로그아웃</button>

  <input type="date" id="date">

  <select id="category"></select>

  <input type="text" id="content" placeholder="내용">

  <input type="number" id="amount" placeholder="금액">

  <button onclick="save()">저장</button>

  <hr>

  <div id="list"></div>

</div>

<script>
const API = "여기에_AppsScript_URL";

let SECRET = "";
let categories = [];
let records = [];

// 👉 자동 로그인
window.onload = function () {
  const saved = localStorage.getItem("secret");

  if (saved) {
    SECRET = saved;
    initApp();
  }
};

// 👉 로그인
function login() {
  const pw = document.getElementById("pw").value;

  if (!pw) {
    alert("비밀번호 입력해줘");
    return;
  }

  SECRET = pw;
  localStorage.setItem("secret", pw);

  initApp();
}

// 👉 로그아웃
function logout() {
  localStorage.removeItem("secret");
  location.reload();
}

// 👉 앱 초기화
function initApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("date").valueAsDate = new Date();

  loadData();
}

// 👉 데이터 불러오기
function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      categories = data.categories;
      records = data.records;

      renderCategory();
      renderList();
    });
}

// 👉 드롭다운 렌더링
function renderCategory() {
  const select = document.getElementById("category");

  select.innerHTML = "<option value=''>카테고리 선택</option>";

  categories.forEach(c => {
    select.innerHTML += `<option>${c.value}</option>`;
  });
}

// 👉 리스트 렌더링
function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.reverse().forEach(r => {
    list.innerHTML += `
      <div class="record">
        ${r.date} | ${r.content} | ${r.amount}
        <button onclick="remove(${r.rowIndex})">삭제</button>
      </div>
    `;
  });
}

// 👉 저장
function save() {
  const data = {
    action: "add",
    secret: SECRET,
    date: document.getElementById("date").value,
    type: document.getElementById("category").value,
    content: document.getElementById("content").value,
    amount: document.getElementById("amount").value
  };

  if (!data.type || !data.amount) {
    alert("필수값 입력해줘!");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("저장 완료!");
    location.reload();
  });
}

// 👉 삭제
function remove(rowIndex) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      secret: SECRET,
      rowIndex: rowIndex
    })
  })
  .then(() => {
    alert("삭제 완료!");
    location.reload();
  });
}
</script>

</body>
</html>
