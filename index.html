<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f6f8;
  margin: 0;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

.primary { background: #4CAF50; color: white; }
.danger { background: #ff4d4f; color: white; }
.logout { background: #999; color: white; }

.row {
  display: flex;
  gap: 10px;
}

.row > * {
  flex: 1;
}

.record {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.amount {
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🐿️ 가계부</h2>

<div id="loginBox" class="card">
  <input type="password" id="pw" placeholder="비밀번호">
  <button class="primary" onclick="login()">입장</button>
</div>

<div id="app" style="display:none;">

  <button class="logout" onclick="logout()">로그아웃</button>

  <div class="card">
    <input type="date" id="date">
    <select id="category"></select>
    <input type="text" id="content" placeholder="내용">
    <input type="number" id="amount" placeholder="금액">

    <div class="row">
      <select id="inAccount"></select>
      <select id="outAccount"></select>
    </div>

    <button class="primary" onclick="save()">저장</button>
  </div>

  <div class="card" id="list"></div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwnMQhPzY-ZRoZlY49FdV1ed0NxJC05iFVT2WF_zfIcE7iezUKWwuzf-SCpEM06u6O6/exec";

let SECRET = "";
let categories = [];
let records = [];

window.onload = function () {
  const saved = localStorage.getItem("secret");
  if (saved) {
    SECRET = saved;
    initApp();
  }
};

function login() {
  const pw = document.getElementById("pw").value;
  if (!pw) return alert("비밀번호 입력");

  SECRET = pw;
  localStorage.setItem("secret", pw);
  initApp();
}

function logout() {
  localStorage.removeItem("secret");
  location.reload();
}

function initApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("date").valueAsDate = new Date();
  loadData();
}

function loadData() {
  fetch(API)
    .then(res => {
      console.log("응답:", res);
      return res.json();
    })
    .then(data => {
      console.log("데이터:", data);

      categories = data.categories;
      records = data.records;

      renderCategory();
      renderAccounts();
      renderList();
    })
    .catch(err => {
      console.error("에러:", err);
      alert("API 호출 실패");
    });
}

function renderCategory() {
  const select = document.getElementById("category");
  select.innerHTML = "<option>카테고리 선택</option>";
  categories.forEach(c => {
    select.innerHTML += `<option>${c.value}</option>`;
  });
}

function formatDate(dateStr) {
  const date = new Date(dateStr);

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");

  return `${y}-${m}-${d}`;
}
  
function renderAccounts() {
  const accounts = ["💵 기업은행 허브", "🐷 청년도약계좌"];

  const inSelect = document.getElementById("inAccount");
  const outSelect = document.getElementById("outAccount");

  inSelect.innerHTML = "<option>입금계좌</option>";
  outSelect.innerHTML = "<option>출금계좌</option>";

  accounts.forEach(acc => {
    inSelect.innerHTML += `<option>${acc}</option>`;
    outSelect.innerHTML += `<option>${acc}</option>`;
  });
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach(r => {
    list.innerHTML += `
      <div class="record">
        <div class="record-info">
          <div class="content">${r.content}</div>
          <small class="date">${formatDate(r.date)}</small>
        </div>
        <div class="right">
          <div class="amount">${Number(r.amount).toLocaleString()}원</div>
          <button class="danger" onclick="remove(${r.rowIndex})">삭제</button>
        </div>
      </div>
    `;
  });
}

function save() {
  const data = {
    action: "add",
    secret: SECRET,
    date: document.getElementById("date").value,
    type: document.getElementById("category").value,
    tag: "",
    content: document.getElementById("content").value,
    amount: document.getElementById("amount").value,
    inAccount: document.getElementById("inAccount").value,
    outAccount: document.getElementById("outAccount").value
  };

  if (!data.type || !data.amount) {
    return alert("필수값 입력");
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => location.reload());
}

function remove(rowIndex) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      secret: SECRET,
      rowIndex
    })
  }).then(() => location.reload());
}
</script>

</body>
</html>
