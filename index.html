<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { padding:20px; font-family:sans-serif; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
.record { border-bottom:1px solid #ccc; padding:10px 0; }
</style>
</head>
<body>

<h2>가계부</h2>

<input type="date" id="date">
<select id="category"></select>
<input type="text" id="content" placeholder="내용">
<input type="number" id="amount" placeholder="금액">

<button onclick="save()">저장</button>

<hr>

<div id="list"></div>

<script>
const API = "앱스크립트_URL";
const SECRET = "my-secret-123";

let categories = [];
let records = [];

document.getElementById("date").valueAsDate = new Date();

// 초기 로딩
fetch(API)
  .then(res => res.json())
  .then(data => {
    categories = data.categories;
    records = data.records;

    renderCategory();
    renderList();
  });

function renderCategory() {
  const select = document.getElementById("category");

  select.innerHTML = "";

  categories.forEach(c => {
    select.innerHTML += `<option>${c.value}</option>`;
  });
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.reverse().forEach(r => {
    list.innerHTML += `
      <div class="record">
        ${r.date} | ${r.content} | ${r.amount}
        <button onclick="remove(${r.rowIndex})">삭제</button>
      </div>
    `;
  });
}

function save() {
  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"add",
      secret:SECRET,
      date: document.getElementById("date").value,
      type: document.getElementById("category").value,
      content: document.getElementById("content").value,
      amount: document.getElementById("amount").value
    })
  }).then(()=>location.reload());
}

function remove(rowIndex) {
  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"delete",
      secret:SECRET,
      rowIndex: rowIndex
    })
  }).then(()=>location.reload());
}
</script>

</body>
</html>
