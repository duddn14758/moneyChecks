<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부 입력</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
    }
    button { background: #4CAF50; color: white; }
  </style>
</head>
<body>

<h2>가계부 입력</h2>

<input type="date" id="date">

<select id="type">
  <option>지출  ›  👤 용돈  ›  서희용돈👰</option>
  <option>자산이동</option>
</select>

<select id="tag">
  <option>용돈</option>
  <option>예적금</option>
</select>

<input type="text" id="content" placeholder="내용">

<input type="number" id="amount" placeholder="금액">

<select id="inAccount">
  <option value="">없음</option>
  <option>🐷 청년도약계좌</option>
</select>

<select id="outAccount">
  <option value="">없음</option>
  <option>💵 기업은행 허브</option>
</select>

<button onclick="submitData()">저장</button>

<script>
const API_URL = "여기에_Apps_Script_URL";

function submitData() {
  const data = {
    date: document.getElementById("date").value,
    type: document.getElementById("type").value,
    tag: document.getElementById("tag").value,
    content: document.getElementById("content").value,
    amount: document.getElementById("amount").value,
    inAccount: document.getElementById("inAccount").value,
    outAccount: document.getElementById("outAccount").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("저장 완료!");
  })
  .catch(() => {
    alert("에러 발생");
  });
}
</script>

</body>
</html>
